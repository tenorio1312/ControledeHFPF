<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário Corporativo | Naman Capital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0A0A4A',
                            light: '#0073CF',
                            accent: '#E5E7EB',
                        },
                        status: {
                            presencial: '#10B981',
                            home: '#3B82F6',
                            ferias: '#F59E0B',
                            medico: '#EF4444',
                            feriado: '#8B5CF6',
                            ponte: '#000000'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .login-bg-animated {
            background: linear-gradient(-45deg, #0A0A4A, #1e1e7a, #0073CF, #004d8a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .calendar-day-cell { min-height: 110px; transition: all 0.2s; }
        .locked-day { background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.02) 10px, rgba(0,0,0,0.02) 20px); }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .mini-day { aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.6rem; border-radius: 4px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .mini-day:hover { transform: scale(1.1); z-index: 10; border-color: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const DOMAIN = "@namancapital.com.br";
        
        const STATUS_OPTIONS = {
            PRESENCIAL: { id: 'presencial', label: 'Presencial', color: 'bg-status-presencial' },
            HOME_OFFICE: { id: 'home', label: 'Home Office', color: 'bg-status-home' },
            FERIAS: { id: 'ferias', label: 'Férias', color: 'bg-status-ferias' },
            ATESTADO: { id: 'medico', label: 'Atestado Médico', color: 'bg-status-medico' },
            FERIADO: { id: 'feriado', label: 'Feriado', color: 'bg-status-feriado' },
            PONTE: { id: 'ponte', label: 'Ponte/Compensação', color: 'bg-status-ponte' },
            HORA_EXTRA: { id: 'hora_extra', label: 'Hora_Extra', color: 'bg-status-extra' }
        };

        const FIXED_DATES = {
            '2026-01-01': { status: 'feriado', label: 'Confraternização Universal' },
            '2026-04-21': { status: 'feriado', label: 'Tiradentes' },
            '2026-05-01': { status: 'feriado', label: 'Dia do Trabalho' },
            '2026-06-04': { status: 'feriado', label: 'Corpus Christi' },
            '2026-06-05': { status: 'ponte', label: 'Ponte de Corpus Christi' },
            '2026-07-09': { status: 'feriado', label: 'Revolução Constitucionalista' },
            '2026-07-10': { status: 'ponte', label: 'Ponte de 09 de Julho' },
            '2026-09-07': { status: 'feriado', label: 'Independência do Brasil' },
            '2026-10-12': { status: 'feriado', label: 'Nossa Senhora Aparecida' },
            '2026-11-02': { status: 'feriado', label: 'Finados' },
            '2026-11-20': { status: 'feriado', label: 'Consciência Negra' },
            '2026-12-24': { status: 'ponte', label: 'Véspera de Natal' },
            '2026-12-25': { status: 'feriado', label: 'Natal' },
            '2026-12-31': { status: 'ponte', label: 'Véspera de Ano Novo' }
        };

        const DEFAULT_USERS = [
            { email: `admin${DOMAIN}`, password: '123', role: 'ADMIN', name: 'Administrador Sistema', team: 'Diretoria' },
            { email: `gestor${DOMAIN}`, password: '123', role: 'GESTOR', name: 'Gestor TI', team: 'TI' },
            { email: `user${DOMAIN}`, password: '123', role: 'COLABORADOR', name: 'Dev Junior', team: 'TI' }
        ];

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [users, setUsers] = useState([]);
            const [events, setEvents] = useState([]);
            const [activeTab, setActiveTab] = useState('CALENDAR');
            const [showChangePassword, setShowChangePassword] = useState(false);

            useEffect(() => {
                const storedUsers = JSON.parse(localStorage.getItem('naman_users'));
                const finalUsers = (storedUsers && storedUsers.length > 0) ? storedUsers : DEFAULT_USERS;
                setUsers(finalUsers);
                
                const storedEvents = JSON.parse(localStorage.getItem('naman_events')) || [];
                setEvents(storedEvents);
                
                const sessionUser = JSON.parse(localStorage.getItem('naman_session'));
                if (sessionUser) {
                    const freshUser = finalUsers.find(u => u.email === sessionUser.email);
                    if (freshUser) {
                        setCurrentUser(freshUser);
                        if (freshUser.password === '123') setShowChangePassword(true);
                    }
                }
            }, []);

            useEffect(() => { if (users.length > 0) localStorage.setItem('naman_users', JSON.stringify(users)); }, [users]);
            useEffect(() => { localStorage.setItem('naman_events', JSON.stringify(events)); }, [events]);

            const handleLogin = (user) => {
                setCurrentUser(user);
                localStorage.setItem('naman_session', JSON.stringify(user));
                if (user.password === '123') setShowChangePassword(true);
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setActiveTab('CALENDAR');
                setShowChangePassword(false);
                localStorage.removeItem('naman_session');
            };

            const handleUpdatePassword = (newPassword) => {
                const updatedUsers = users.map(u => u.email === currentUser.email ? { ...u, password: newPassword } : u);
                setUsers(updatedUsers);
                const updatedMe = { ...currentUser, password: newPassword };
                setCurrentUser(updatedMe);
                localStorage.setItem('naman_session', JSON.stringify(updatedMe));
                setShowChangePassword(false);
            };

            const handleBulkEventsImport = (newEvents, discoveredUsers) => {
                if (discoveredUsers.length > 0) {
                    setUsers(prev => {
                        const existing = new Set(prev.map(u => u.email.toLowerCase()));
                        const toAdd = discoveredUsers.filter(u => !existing.has(u.email.toLowerCase()));
                        return [...prev, ...toAdd];
                    });
                }

                setEvents(prev => {
                    const updated = [...prev];
                    newEvents.forEach(item => {
                        const idx = updated.findIndex(e => e.date === item.date && e.email.toLowerCase() === item.email.toLowerCase());
                        if (idx > -1) updated[idx] = item;
                        else updated.push(item);
                    });
                    return [...updated];
                });
            };

            if (!currentUser) return <LoginScreen onLogin={handleLogin} users={users} />;
            if (showChangePassword) return <ChangePasswordScreen user={currentUser} onUpdate={handleUpdatePassword} onLogout={handleLogout} />;

            return (
                <div className="min-h-screen flex flex-col bg-gray-50">
                    <Navbar user={currentUser} onLogout={handleLogout} activeTab={activeTab} onTabChange={setActiveTab} />
                    <main className="flex-grow container mx-auto px-4 py-8 max-w-7xl">
                        {activeTab === 'CALENDAR' && <Calendar user={currentUser} events={events} onAddEvent={(date, status, email) => setEvents(prev => {
                            const filtered = prev.filter(e => !(e.date === date && e.email === email));
                            return status ? [...filtered, { date, status, email }] : filtered;
                        })} users={users} />}
                        {activeTab === 'YEAR_VIEW' && <YearlyView user={currentUser} events={events} users={users} />}
                        {activeTab === 'USERS' && <UserManagement currentUser={currentUser} users={users} 
                            onAddUser={u => setUsers(p => [...p, u])} 
                            onUpdateUser={(email, upds) => setUsers(p => p.map(u => u.email === email ? {...u, ...upds} : u))} 
                            onRemoveUser={email => { setUsers(p => p.filter(u => u.email !== email)); setEvents(p => p.filter(e => e.email !== email)); }} 
                            onImportEvents={handleBulkEventsImport} 
                        />}
                    </main>
                </div>
            );
        }

        function LoginScreen({ onLogin, users }) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const suggestion = useMemo(() => {
                if (!email || email.includes('@')) return '';
                return DOMAIN;
            }, [email]);

            const handleKeyDown = (e) => {
                if (e.key === 'Tab' && suggestion) {
                    e.preventDefault();
                    setEmail(email + suggestion);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center login-bg-animated p-4">
                    <div className="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl w-full max-w-md overflow-hidden animate-fade-in">
                        <div className="p-10 text-center">
                            <h1 className="text-4xl font-light tracking-[0.25em] text-brand-dark mb-1">NAMAN</h1>
                            <p className="text-blue-600 text-[10px] uppercase tracking-[0.4em] font-black mb-10">CAPITAL</p>
                            <form onSubmit={e => {
                                e.preventDefault();
                                const u = users.find(usr => usr.email.toLowerCase() === email.toLowerCase());
                                if (!u || password !== u.password) return setError('Credenciais inválidas.');
                                onLogin(u);
                            }} className="space-y-6 text-left">
                                <div className="relative">
                                    <input 
                                        type="text" 
                                        className="w-full px-4 py-3 border-b-2 border-gray-100 outline-none text-sm bg-transparent relative z-10" 
                                        placeholder="E-mail Corporativo" 
                                        value={email} 
                                        onKeyDown={handleKeyDown}
                                        onChange={e => setEmail(e.target.value)} 
                                        required 
                                    />
                                    {suggestion && (
                                        <div 
                                            className="absolute left-4 top-3 text-sm text-gray-300 pointer-events-none z-0"
                                            style={{ paddingLeft: `${email.length}ch` }}
                                        >
                                            {suggestion}
                                            <span className="ml-2 text-[8px] bg-gray-100 px-1 rounded text-gray-400">TAB</span>
                                        </div>
                                    )}
                                </div>
                                <input type="password" className="w-full px-4 py-3 border-b-2 border-gray-100 outline-none text-sm" placeholder="Senha" value={password} onChange={e => setPassword(e.target.value)} required />
                                {error && <p className="text-red-500 text-[10px] font-black text-center uppercase">{error}</p>}
                                <button type="submit" className="w-full bg-brand-dark text-white font-black py-4 rounded-2xl shadow-xl hover:bg-brand-light transition-all uppercase tracking-widest text-xs">Entrar</button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        function ChangePasswordScreen({ onUpdate, onLogout }) {
            const [p, setP] = useState('');
            const [p2, setP2] = useState('');
            const [e, setE] = useState('');
            return (
                <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-10">
                        <h2 className="text-2xl font-bold text-brand-dark text-center mb-6">Alteração Obrigatória</h2>
                        <div className="space-y-6">
                            <input type="password" placeholder="Nova Senha" value={p} onChange={v => setP(v.target.value)} className="w-full p-4 border rounded-xl" />
                            <input type="password" placeholder="Confirmar" value={p2} onChange={v => setP2(v.target.value)} className="w-full p-4 border rounded-xl" />
                            {e && <p className="text-red-500 text-[10px] font-black uppercase text-center">{e}</p>}
                            <button onClick={() => { if(p.length < 4) return setE('Mínimo 4 caracteres'); if(p !== p2) return setE('Senhas não conferem'); onUpdate(p); }} className="w-full bg-brand-dark text-white font-black py-4 rounded-xl uppercase">Atualizar</button>
                            <button onClick={onLogout} className="w-full text-gray-400 text-xs font-black uppercase">Sair</button>
                        </div>
                    </div>
                </div>
            );
        }

        function Navbar({ user, onLogout, activeTab, onTabChange }) {
            return (
                <nav className="bg-brand-dark text-white shadow-xl h-16 flex items-center px-6 sticky top-0 z-40">
                    <div className="flex items-center flex-1 space-x-8">
                        <div className="flex flex-col"><span className="text-xl font-light tracking-widest">NAMAN</span><span className="text-[8px] font-black text-blue-400">CAPITAL</span></div>
                        <div className="flex space-x-2">
                            <NavBtn active={activeTab === 'CALENDAR'} onClick={() => onTabChange('CALENDAR')}>Agenda</NavBtn>
                            <NavBtn active={activeTab === 'YEAR_VIEW'} onClick={() => onTabChange('YEAR_VIEW')}>Anual</NavBtn>
                            {user.role !== 'COLABORADOR' && <NavBtn active={activeTab === 'USERS'} onClick={() => onTabChange('USERS')}>Gestão</NavBtn>}
                        </div>
                    </div>
                    <div className="flex items-center space-x-4">
                        <div className="text-right"><p className="text-[10px] font-black uppercase">{user.name}</p><p className="text-[8px] text-blue-300 font-bold">{user.role} | {user.team}</p></div>
                        <button onClick={onLogout} className="p-2 bg-white/5 rounded-xl hover:bg-red-500/20 transition-all"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg></button>
                    </div>
                </nav>
            );
        }

        const NavBtn = ({ active, children, onClick }) => (
            <button onClick={onClick} className={`px-4 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${active ? 'bg-brand-light text-white' : 'text-blue-200 hover:text-white hover:bg-white/5'}`}>{children}</button>
        );

        function Calendar({ user, events, onAddEvent, users }) {
            const [curr, setCurr] = useState(new Date());
            const [view, setView] = useState(user.role === 'COLABORADOR' ? 'INDIVIDUAL' : 'GLOBAL');
            const [selUser, setSelUser] = useState(user.email);
            const [modal, setModal] = useState(null);

            const year = curr.getFullYear();
            const month = curr.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();
            const days = Array(firstDay).fill(null).concat([...Array(daysInMonth).keys()].map(i => i + 1));

            const visibleUsers = useMemo(() => {
                if (user.role === 'ADMIN') return users;
                if (user.role === 'GESTOR') return users.filter(u => u.team === user.team);
                return users.filter(u => u.email === user.email);
            }, [users, user]);

            return (
                <div className="animate-fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <div className="flex items-center gap-4 bg-white p-2 rounded-2xl shadow-sm">
                            <button onClick={() => setCurr(new Date(year, month - 1, 1))} className="p-2 text-gray-400 hover:text-brand-dark transition-colors">❮</button>
                            <h2 className="text-sm font-black uppercase tracking-widest w-48 text-center">{new Intl.DateTimeFormat('pt-BR', {month:'long', year:'numeric'}).format(curr)}</h2>
                            <button onClick={() => setCurr(new Date(year, month + 1, 1))} className="p-2 text-gray-400 hover:text-brand-dark transition-colors">❯</button>
                        </div>
                        <div className="flex gap-2">
                             {user.role !== 'COLABORADOR' && (
                                <select value={view} onChange={e => setView(e.target.value)} className="text-[10px] font-black uppercase bg-white border px-3 py-2 rounded-xl focus:ring-2 ring-brand-light outline-none">
                                    <option value="GLOBAL">Vista de Equipe</option>
                                    <option value="INDIVIDUAL">Filtrar Usuário</option>
                                </select>
                             )}
                             {view === 'INDIVIDUAL' && (
                                <select value={selUser} onChange={e => setSelUser(e.target.value)} className="text-[10px] font-black uppercase bg-white border px-3 py-2 rounded-xl focus:ring-2 ring-brand-light outline-none">
                                    {visibleUsers.map(u => <option key={u.email} value={u.email}>{u.name}</option>)}
                                </select>
                             )}
                        </div>
                    </div>

                    <div className="bg-white rounded-3xl shadow-xl overflow-hidden grid grid-cols-7 gap-px border bg-gray-100">
                        {["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"].map(d => <div key={d} className="bg-gray-50 py-3 text-center text-[10px] font-black uppercase text-gray-400">{d}</div>)}
                        {days.map((day, idx) => {
                            const dateStr = day ? `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}` : null;
                            const isWeekend = idx % 7 === 0 || idx % 7 === 6;
                            const fixed = dateStr ? FIXED_DATES[dateStr] : null;
                            const dayEvts = dateStr ? (view === 'GLOBAL' ? events.filter(e => e.date === dateStr && visibleUsers.some(vu => vu.email.toLowerCase() === e.email.toLowerCase())) : events.filter(e => e.date === dateStr && e.email.toLowerCase() === selUser.toLowerCase())) : [];

                            return (
                                <div key={idx} onClick={() => day && setModal({ date: dateStr })} className={`calendar-day-cell p-2 cursor-pointer hover:bg-blue-50/50 transition-colors ${isWeekend ? 'bg-gray-50/50' : 'bg-white'} ${fixed ? 'locked-day' : ''}`}>
                                    {day && (
                                        <>
                                            <span className="text-[11px] font-black text-gray-400">{day}</span>
                                            <div className="mt-1 space-y-1">
                                                {fixed && <div className={`text-[7px] font-black uppercase p-1 rounded text-white ${fixed.status === 'feriado' ? 'bg-status-feriado' : 'bg-status-ponte'}`}>{fixed.label}</div>}
                                                {dayEvts.map((ev, i) => {
                                                    const st = Object.values(STATUS_OPTIONS).find(s => s.id === ev.status);
                                                    const u = users.find(usr => usr.email.toLowerCase() === ev.email.toLowerCase());
                                                    return (
                                                        <div key={i} className={`text-[7px] font-black uppercase p-1 rounded text-white truncate shadow-sm ${st?.color || 'bg-gray-400'}`}>
                                                            {view === 'GLOBAL' ? `${u?.name.split(' ')[0] || '?'}: ${st?.label}` : st?.label}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                    {modal && <EventModal date={modal.date} activeUser={user} targetEmail={view === 'INDIVIDUAL' ? selUser : user.email} allEvents={events} users={visibleUsers} onClose={() => setModal(null)} onSave={onAddEvent} fixedData={FIXED_DATES[modal.date]} />}
                </div>
            );
        }

        function YearlyView({ user, events, users }) {
            const [sel, setSel] = useState(user.email);
            const visibleUsers = useMemo(() => {
                if (user.role === 'ADMIN') return users;
                if (user.role === 'GESTOR') return users.filter(u => u.team === user.team);
                return [user];
            }, [users, user]);

            return (
                <div className="space-y-8 animate-fade-in">
                    <div className="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border">
                        <select value={sel} onChange={e => setSel(e.target.value)} className="text-[10px] font-black uppercase p-2 border rounded-lg focus:ring-2 ring-brand-light outline-none">
                            {visibleUsers.map(u => <option key={u.email} value={u.email}>{u.name} ({u.team})</option>)}
                        </select>
                        <span className="text-[10px] font-black uppercase text-gray-400 tracking-widest">Resumo Anual 2026</span>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        {[...Array(12).keys()].map(m => {
                            const first = new Date(2026, m, 1).getDay();
                            const total = new Date(2026, m + 1, 0).getDate();
                            const days = Array(first).fill(null).concat([...Array(total).keys()].map(i => i+1));
                            return (
                                <div key={m} className="bg-white p-3 rounded-2xl shadow-sm border border-gray-100">
                                    <h4 className="text-center text-[10px] font-black uppercase mb-3 text-brand-dark">{new Intl.DateTimeFormat('pt-BR', {month:'long'}).format(new Date(2026, m, 1))}</h4>
                                    <div className="grid grid-cols-7 gap-1">
                                        {days.map((d, i) => {
                                            if(!d) return <div key={i} />;
                                            const fmt = `2026-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                                            const fix = FIXED_DATES[fmt];
                                            const ev = events.find(e => e.date === fmt && e.email.toLowerCase() === sel.toLowerCase());
                                            const st = Object.values(STATUS_OPTIONS).find(s => s.id === (ev?.status || fix?.status));
                                            return <div key={i} className={`mini-day ${st ? `${st.color} text-white` : 'text-gray-300 bg-gray-50'}`}>{d}</div>
                                        })}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function EventModal({ date, activeUser, targetEmail, allEvents, users, onClose, onSave, fixedData }) {
            const myEv = allEvents.find(e => e.date === date && e.email.toLowerCase() === targetEmail.toLowerCase());
            const [sel, setSel] = useState(myEv ? myEv.status : '');
            const dayEvs = allEvents.filter(e => e.date === date && users.some(u => u.email.toLowerCase() === e.email.toLowerCase()));

            return (
                <div className="fixed inset-0 bg-brand-dark/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden animate-fade-in">
                        <div className="bg-brand-dark p-6 text-white flex justify-between items-center">
                            <div><h3 className="text-sm font-black uppercase tracking-widest">{date}</h3></div>
                            <button onClick={onClose} className="p-2 bg-white/5 rounded-full hover:bg-white/10 transition-colors">✕</button>
                        </div>
                        <div className="p-6 space-y-6">
                            <div className="space-y-2">
                                <h4 className="text-[10px] font-black text-gray-400 uppercase border-b pb-1">Marcação para: {targetEmail}</h4>
                                {fixedData ? <div className="bg-gray-100 p-4 rounded-xl text-center font-bold text-gray-600">{fixedData.label}</div> : (
                                    <div className="grid grid-cols-3 gap-2">
                                        {Object.values(STATUS_OPTIONS).filter(s => s.id !== 'feriado' && s.id !== 'ponte').map(s => (
                                            <button key={s.id} onClick={() => setSel(s.id)} className={`p-3 rounded-xl border text-[9px] font-black uppercase transition-all shadow-sm ${sel === s.id ? `${s.color} text-white border-transparent` : 'bg-white text-gray-400 border-gray-100'}`}>{s.label}</button>
                                        ))}
                                        <button onClick={() => setSel('')} className="p-3 rounded-xl border text-[9px] font-black bg-red-50 text-red-400 uppercase border-red-100 shadow-sm">Limpar</button>
                                    </div>
                                )}
                            </div>
                            <div className="space-y-2">
                                <h4 className="text-[10px] font-black text-gray-400 uppercase border-b pb-1">Presença da Equipe</h4>
                                <div className="max-h-40 overflow-y-auto space-y-1">
                                    {dayEvs.length === 0 && <p className="text-[10px] text-gray-300 italic p-2 text-center">Ninguém escalado.</p>}
                                    {dayEvs.map((e, i) => {
                                        const u = users.find(usr => usr.email.toLowerCase() === e.email.toLowerCase());
                                        const st = Object.values(STATUS_OPTIONS).find(s => s.id === e.status);
                                        return <div key={i} className="flex justify-between text-[10px] bg-gray-50 p-2 rounded border border-gray-100"><strong>{u?.name || 'User'}</strong> <span className="uppercase font-black text-gray-400">{st?.label}</span></div>
                                    })}
                                </div>
                            </div>
                        </div>
                        <div className="p-6 bg-gray-50 border-t">
                            {!fixedData && <button onClick={() => { onSave(date, sel, targetEmail); onClose(); }} className="w-full bg-brand-light text-white text-[10px] font-black uppercase py-4 rounded-2xl shadow-lg hover:bg-brand-dark transition-all">Salvar Marcação</button>}
                        </div>
                    </div>
                </div>
            );
        }

        function UserManagement({ currentUser, users, onAddUser, onUpdateUser, onRemoveUser, onImportEvents }) {
            const [form, setForm] = useState({ email: '', name: '', team: '', role: 'COLABORADOR', password: '123' });
            const [editingEmail, setEditingEmail] = useState(null);
            const [editForm, setEditForm] = useState({});
            const [msg, setMsg] = useState('');
            const fileRef = useRef(null);

            const isRestricted = (targetUser) => {
                if (currentUser.role === 'ADMIN') return false;
                if (currentUser.role === 'GESTOR') {
                    return targetUser.role === 'ADMIN' || targetUser.team !== currentUser.team;
                }
                return true;
            };

            const startEdit = (u) => {
                setEditingEmail(u.email);
                setEditForm({ name: u.name, team: u.team, role: u.role });
            };

            const saveEdit = () => {
                onUpdateUser(editingEmail, editForm);
                setEditingEmail(null);
                setMsg('Cadastro atualizado!');
                setTimeout(() => setMsg(''), 2000);
            };

            const handleEventImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const text = evt.target.result;
                    const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
                    
                    const newEvents = [];
                    const discoveredUsers = [];

                    lines.forEach((line) => {
                        const parts = line.includes(';') ? line.split(';') : line.split(',');
                        if (parts.length < 3) return;
                        
                        const dateRaw = parts[0].trim();
                        const email = parts[1].trim();
                        const status = parts[2].trim().toLowerCase();

                        if (dateRaw.toLowerCase() === 'data' || email.toLowerCase() === 'email') return;

                        if (dateRaw && email && status) {
                            newEvents.push({ date: dateRaw, email, status });
                            
                            const exists = users.some(u => u.email.toLowerCase() === email.toLowerCase());
                            const alreadyDiscovered = discoveredUsers.some(u => u.email.toLowerCase() === email.toLowerCase());
                            
                            if (!exists && !alreadyDiscovered) {
                                const namePart = email.split('@')[0].split('.').map(s => s.charAt(0).toUpperCase() + s.slice(1)).join(' ');
                                discoveredUsers.push({
                                    email: email,
                                    name: namePart,
                                    team: 'Importado',
                                    role: 'COLABORADOR',
                                    password: '123'
                                });
                            }
                        }
                    });
                    
                    onImportEvents(newEvents, discoveredUsers);
                    setMsg(`${newEvents.length} marcações processadas.`);
                    setTimeout(() => setMsg(''), 3000);
                };
                reader.readAsText(file);
            };

            const filteredUsers = users.filter(u => !isRestricted(u) || u.email === currentUser.email);

            return (
                <div className="space-y-6 animate-fade-in pb-20">
                    {msg && <div className="fixed top-20 right-4 bg-brand-dark text-white px-6 py-3 rounded-xl z-50 text-xs font-black uppercase shadow-2xl animate-bounce">{msg}</div>}
                    
                    <div className="bg-white rounded-3xl shadow-lg p-8 border">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                            <h2 className="text-xl font-bold text-brand-dark">Gestão de Usuários e Escalas</h2>
                            <div className="flex gap-2">
                                <input type="file" ref={fileRef} onChange={handleEventImport} accept=".csv" className="hidden" />
                                <button onClick={() => fileRef.current.click()} className="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-blue-700 transition-colors shadow-sm">Importar Escala CSV</button>
                                <button onClick={() => {
                                    const csvData = "Data,Email,Status\n2026-04-27,patricia.lopes@namancapital.com.br,home\n2026-04-28,patricia.lopes@namancapital.com.br,presencial";
                                    const blob = new Blob([csvData], { type: 'text/csv' });
                                    const url = window.URL.createObjectURL(blob);
                                    const a = document.createElement('a');
                                    a.setAttribute('hidden', ''); a.setAttribute('href', url); a.setAttribute('download', 'modelo_escala.csv');
                                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                                }} className="bg-gray-100 text-gray-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-gray-200">Modelo CSV</button>
                            </div>
                        </div>

                        {currentUser.role === 'ADMIN' && (
                            <div className="bg-gray-50 p-6 rounded-2xl mb-8 border border-gray-100">
                                <h3 className="text-xs font-black uppercase mb-4 text-gray-400 tracking-tighter">Novo Colaborador Manual</h3>
                                <form className="grid grid-cols-1 md:grid-cols-5 gap-3" onSubmit={e => { e.preventDefault(); onAddUser({...form}); setForm({email:'', name:'', team:'', role:'COLABORADOR', password:'123'}); }}>
                                    <input required placeholder="E-mail Corporativo" value={form.email} onChange={v => setForm({...form, email:v.target.value})} className="p-3 border rounded-xl text-xs bg-white focus:ring-2 ring-brand-light outline-none" />
                                    <input required placeholder="Nome Completo" value={form.name} onChange={v => setForm({...form, name:v.target.value})} className="p-3 border rounded-xl text-xs bg-white focus:ring-2 ring-brand-light outline-none" />
                                    <input required placeholder="Setor/Equipe" value={form.team} onChange={v => setForm({...form, team:v.target.value})} className="p-3 border rounded-xl text-xs bg-white focus:ring-2 ring-brand-light outline-none" />
                                    <select value={form.role} onChange={v => setForm({...form, role:v.target.value})} className="p-3 border rounded-xl text-[10px] font-black uppercase bg-white focus:ring-2 ring-brand-light outline-none">
                                        <option value="COLABORADOR">Colaborador</option>
                                        <option value="GESTOR">Gestor</option>
                                        <option value="ADMIN">Admin</option>
                                    </select>
                                    <button className="bg-brand-dark text-white rounded-xl text-[10px] font-black uppercase hover:bg-brand-light transition-all shadow-md">Adicionar</button>
                                </form>
                            </div>
                        )}

                        <div className="overflow-hidden rounded-2xl border bg-white">
                            <table className="w-full text-left">
                                <thead className="bg-gray-50 border-b text-[10px] font-black text-gray-400 uppercase tracking-widest"><tr className="text-left"><th className="px-6 py-4">Nome / E-mail</th><th className="px-6 py-4">Equipe</th><th className="px-6 py-4">Nível</th><th className="px-6 py-4 text-right">Ações</th></tr></thead>
                                <tbody className="divide-y divide-gray-100">
                                    {filteredUsers.map(u => (
                                        <tr key={u.email} className="hover:bg-gray-50/50 transition-colors">
                                            <td className="px-6 py-4">
                                                {editingEmail === u.email ? (
                                                    <input value={editForm.name} onChange={e => setEditForm({...editForm, name: e.target.value})} className="p-2 border rounded-lg text-sm w-full focus:ring-2 ring-brand-light outline-none" />
                                                ) : (
                                                    <div><div className="font-bold text-sm text-brand-dark">{u.name}</div><div className="text-[10px] text-gray-400">{u.email}</div></div>
                                                )}
                                            </td>
                                            <td className="px-6 py-4">
                                                {editingEmail === u.email ? (
                                                    <input value={editForm.team} onChange={e => setEditForm({...editForm, team: e.target.value})} className="p-2 border rounded-lg text-sm w-full focus:ring-2 ring-brand-light outline-none" />
                                                ) : (
                                                    <span className="text-xs font-medium text-gray-600">{u.team}</span>
                                                )}
                                            </td>
                                            <td className="px-6 py-4">
                                                {editingEmail === u.email ? (
                                                    <select value={editForm.role} onChange={e => setEditForm({...editForm, role: e.target.value})} className="p-2 border rounded-lg text-[10px] font-black uppercase focus:ring-2 ring-brand-light outline-none">
                                                        <option value="COLABORADOR">Colaborador</option>
                                                        <option value="GESTOR">Gestor</option>
                                                        <option value="ADMIN">Admin</option>
                                                    </select>
                                                ) : (
                                                    <span className={`text-[8px] font-black uppercase px-2 py-1 rounded shadow-sm ${u.role === 'ADMIN' ? 'bg-purple-100 text-purple-600' : (u.role === 'GESTOR' ? 'bg-blue-100 text-blue-600' : 'bg-gray-100 text-gray-500')}`}>{u.role}</span>
                                                )}
                                            </td>
                                            <td className="px-6 py-4 text-right space-x-2">
                                                {editingEmail === u.email ? (
                                                    <>
                                                        <button onClick={saveEdit} className="text-green-600 text-[9px] font-black uppercase hover:underline">Salvar</button>
                                                        <button onClick={() => setEditingEmail(null)} className="text-gray-400 text-[9px] font-black uppercase hover:underline">Cancelar</button>
                                                    </>
                                                ) : (
                                                    <>
                                                        <button onClick={() => startEdit(u)} className="text-blue-500 text-[9px] font-black uppercase hover:underline">Editar</button>
                                                        <button onClick={() => { onUpdateUser(u.email, {password:'123'}); setMsg(`Senha resetada!`); setTimeout(() => setMsg(''), 2000); }} className="text-gray-400 text-[9px] font-black uppercase hover:underline">Reset</button>
                                                        {u.email !== currentUser.email && u.role !== 'ADMIN' && <button onClick={() => onRemoveUser(u.email)} className="text-red-400 text-[9px] font-black uppercase hover:underline">Excluir</button>}
                                                    </>
                                                )}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
