<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário Corporativo | Naman Capital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0A0A4A',
                            light: '#0073CF',
                            accent: '#E5E7EB',
                        },
                        status: {
                            presencial: '#10B981',
                            home: '#3B82F6',
                            ferias: '#F59E0B',
                            medico: '#EF4444',
                            feriado: '#8B5CF6',
                            ponte: '#000000',
                            extra: '#ec4899',
                            banco: '#6366f1'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .login-bg-animated {
            background: linear-gradient(-45deg, #0A0A4A, #1e1e7a, #0073CF, #004d8a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .calendar-day-cell { min-height: 110px; transition: all 0.2s; }
        .locked-day { background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.02) 10px, rgba(0,0,0,0.02) 20px); }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const DOMAIN = "@namancapital.com.br";
        
        const DEFAULT_TEAMS = ["TI", "Comercial", "Financeiro", "RH", "Diretoria"];

        const STATUS_OPTIONS = {
            PRESENCIAL: { id: 'presencial', label: 'Presencial', color: 'bg-status-presencial' },
            HOME_OFFICE: { id: 'home', label: 'Home Office', color: 'bg-status-home' },
            FERIAS: { id: 'ferias', label: 'Férias', color: 'bg-status-ferias' },
            ATESTADO: { id: 'medico', label: 'Atestado Médico', color: 'bg-status-medico' },
            FERIADO: { id: 'feriado', label: 'Feriado', color: 'bg-status-feriado' },
            PONTE: { id: 'ponte', label: 'Ponte/Compensação', color: 'bg-status-ponte' },
            HORA_EXTRA: { id: 'extra', label: 'Hora Extra', color: 'bg-status-extra' },
            BANCO_HORAS: { id: 'banco', label: 'Banco de Horas', color: 'bg-status-banco' }
        };

        const FIXED_DATES = {
            '2026-01-01': { status: 'feriado', label: 'Confraternização Universal' },
            '2026-04-21': { status: 'feriado', label: 'Tiradentes' },
            '2026-05-01': { status: 'feriado', label: 'Dia do Trabalho' },
            '2026-06-04': { status: 'feriado', label: 'Corpus Christi' },
            '2026-06-05': { status: 'ponte', label: 'Ponte de Corpus Christi' },
            '2026-07-09': { status: 'feriado', label: 'Revolução Constitucionalista' },
            '2026-07-10': { status: 'ponte', label: 'Ponte de 09 de Julho' },
            '2026-09-07': { status: 'feriado', label: 'Independência do Brasil' },
            '2026-10-12': { status: 'feriado', label: 'Nossa Senhora Aparecida' },
            '2026-11-02': { status: 'feriado', label: 'Finados' },
            '2026-11-20': { status: 'feriado', label: 'Consciência Negra' },
            '2026-12-24': { status: 'ponte', label: 'Véspera de Natal' },
            '2026-12-25': { status: 'feriado', label: 'Natal' },
            '2026-12-31': { status: 'ponte', label: 'Véspera de Ano Novo' }
        };

        const INITIAL_USERS = [
            { email: `admin${DOMAIN}`, password: '#Calipe30', role: 'ADMIN', name: 'Administrador Naman', team: 'Diretoria', adjustment: 0, needsPasswordChange: false },
            { email: `gestor${DOMAIN}`, password: '123', role: 'GESTOR', name: 'Gestor Naman', team: 'TI', adjustment: 0, needsPasswordChange: true },
            { email: `user${DOMAIN}`, password: '123', role: 'COLABORADOR', name: 'Colaborador Teste', team: 'TI', adjustment: 0, needsPasswordChange: true }
        ];

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [users, setUsers] = useState([]);
            const [teams, setTeams] = useState([]);
            const [events, setEvents] = useState([]);
            const [activeTab, setActiveTab] = useState('CALENDAR');
            const [isChangingPassword, setIsChangingPassword] = useState(false);
            
            const [filterUser, setFilterUser] = useState('');
            const [viewMode, setViewMode] = useState('TEAM'); 

            useEffect(() => {
                const savedUsers = JSON.parse(localStorage.getItem('naman_users_v3'));
                const savedTeams = JSON.parse(localStorage.getItem('naman_teams_v3'));
                const savedEvents = JSON.parse(localStorage.getItem('naman_events_v3'));
                
                setUsers(savedUsers && savedUsers.length > 0 ? savedUsers : INITIAL_USERS);
                setTeams(savedTeams && savedTeams.length > 0 ? savedTeams : DEFAULT_TEAMS);
                setEvents(savedEvents || []);

                const session = JSON.parse(localStorage.getItem('naman_session_v3'));
                if (session) {
                    setCurrentUser(session);
                    setFilterUser(session.email);
                    if (session.needsPasswordChange) setIsChangingPassword(true);
                }
            }, []);

            useEffect(() => {
                if (users.length > 0) localStorage.setItem('naman_users_v3', JSON.stringify(users));
                if (teams.length > 0) localStorage.setItem('naman_teams_v3', JSON.stringify(teams));
                localStorage.setItem('naman_events_v3', JSON.stringify(events));
            }, [users, teams, events]);

            const handleLogin = (user) => {
                setCurrentUser(user);
                setFilterUser(user.email);
                localStorage.setItem('naman_session_v3', JSON.stringify(user));
                localStorage.setItem('naman_last_email', user.email);
                if (user.needsPasswordChange) setIsChangingPassword(true);
            };

            const handleLogout = () => {
                setCurrentUser(null);
                localStorage.removeItem('naman_session_v3');
                setIsChangingPassword(false);
            };

            const handlePasswordChange = (newPassword) => {
                const updatedUsers = users.map(u => 
                    u.email === currentUser.email ? { ...u, password: newPassword, needsPasswordChange: false } : u
                );
                setUsers(updatedUsers);
                
                const updatedSession = { ...currentUser, password: newPassword, needsPasswordChange: false };
                setCurrentUser(updatedSession);
                localStorage.setItem('naman_session_v3', JSON.stringify(updatedSession));
                setIsChangingPassword(false);
            };

            const calculateBalance = (email) => {
                const user = users.find(u => u.email.toLowerCase() === email.toLowerCase());
                let balance = parseFloat(user?.adjustment || 0);
                
                Object.keys(FIXED_DATES).forEach(date => {
                    if (FIXED_DATES[date].status === 'ponte') balance -= 8;
                });

                const userEvents = events.filter(e => e.email.toLowerCase() === email.toLowerCase());
                userEvents.forEach(ev => {
                    if (ev.status === 'extra') balance += parseFloat(ev.hours || 0);
                    if (ev.status === 'banco') balance -= 8;
                    if (ev.status === 'ponte' && !FIXED_DATES[ev.date]) balance -= 8;
                });
                return balance;
            };

            const statsDisplay = useMemo(() => {
                if (!currentUser || currentUser.role === 'COLABORADOR') return null;
                
                if (viewMode === 'INDIVIDUAL') {
                    const targetUser = users.find(u => u.email === filterUser);
                    return {
                        label: `Saldo: ${targetUser?.name.split(' ')[0] || 'Usuário'}`,
                        total: calculateBalance(filterUser),
                        count: 1
                    };
                } else {
                    const relevantUsers = users.filter(u => currentUser.role === 'ADMIN' || u.team === currentUser.team);
                    const total = relevantUsers.reduce((acc, u) => acc + calculateBalance(u.email), 0);
                    return { 
                        label: currentUser.role === 'ADMIN' ? "Total Empresa" : `Equipe ${currentUser.team}`,
                        total, 
                        count: relevantUsers.length 
                    };
                }
            }, [users, events, currentUser, filterUser, viewMode]);

            if (!currentUser) return <LoginScreen onLogin={handleLogin} users={users} />;

            return (
                <div className="min-h-screen flex flex-col bg-gray-50">
                    <Navbar 
                        user={currentUser} 
                        onLogout={handleLogout} 
                        activeTab={activeTab} 
                        onTabChange={setActiveTab} 
                        stats={statsDisplay}
                        viewMode={viewMode}
                        setViewMode={setViewMode}
                    />
                    
                    {isChangingPassword ? (
                        <PasswordChangeModal onSubmit={handlePasswordChange} />
                    ) : (
                        <main className="flex-grow container mx-auto px-4 py-6">
                            {activeTab === 'CALENDAR' ? (
                                <Calendar 
                                    user={currentUser} 
                                    events={events} 
                                    users={users}
                                    filterUser={filterUser}
                                    setFilterUser={setFilterUser}
                                    onSaveEvent={(date, status, email, hours) => {
                                        setEvents(prev => {
                                            const filtered = prev.filter(e => !(e.date === date && e.email === email));
                                            return status ? [...filtered, { date, status, email, hours }] : filtered;
                                        });
                                    }}
                                />
                            ) : (
                                <ManagerView 
                                    currentUser={currentUser} 
                                    users={users} 
                                    setUsers={setUsers} 
                                    teams={teams}
                                    setTeams={setTeams}
                                    calculateBalance={calculateBalance}
                                />
                            )}
                        </main>
                    )}
                </div>
            );
        }

        function LoginScreen({ onLogin, users }) {
            const [email, setEmail] = useState(localStorage.getItem('naman_last_email') || '');
            const [password, setPassword] = useState('');
            const [err, setErr] = useState('');

            return (
                <div className="min-h-screen flex items-center justify-center login-bg-animated p-4">
                    <div className="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl w-full max-w-md p-10 animate-fade-in">
                        <div className="text-center mb-8">
                            <h1 className="text-4xl font-light tracking-[0.25em] text-brand-dark mb-1 uppercase">Naman</h1>
                            <p className="text-blue-600 text-[10px] uppercase tracking-[0.4em] font-black">Capital</p>
                        </div>
                        <form onSubmit={e => {
                            e.preventDefault();
                            const u = users.find(usr => usr.email.toLowerCase() === email.toLowerCase() && usr.password === password);
                            if (u) onLogin(u); else setErr('Credenciais Inválidas');
                        }} className="space-y-5">
                            <div className="relative">
                                <label className="text-[8px] font-black text-blue-600 uppercase tracking-widest absolute -top-2 left-0">E-mail Corporativo</label>
                                <input type="text" placeholder="exemplo@namancapital.com.br" value={email} onChange={e=>setEmail(e.target.value)} className="w-full px-0 py-3 border-b-2 border-gray-100 outline-none text-sm focus:border-brand-light transition-colors" required />
                            </div>
                            <div className="relative">
                                <label className="text-[8px] font-black text-blue-600 uppercase tracking-widest absolute -top-2 left-0">Senha</label>
                                <input type="password" placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)} className="w-full px-0 py-3 border-b-2 border-gray-100 outline-none text-sm focus:border-brand-light transition-colors" required />
                            </div>
                            {err && <p className="text-red-500 text-[10px] font-black text-center uppercase tracking-tighter">{err}</p>}
                            <button className="w-full bg-brand-dark text-white font-black py-4 rounded-2xl shadow-lg hover:bg-brand-light transition-all uppercase tracking-widest text-xs">Acessar Calendário</button>
                        </form>
                    </div>
                </div>
            );
        }

        function PasswordChangeModal({ onSubmit }) {
            const [pwd, setPwd] = useState('');
            const [confirmPwd, setConfirmPwd] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (pwd.length < 4) return setError('A senha deve ter no mínimo 4 caracteres');
                if (pwd !== confirmPwd) return setError('As senhas não coincidem');
                if (pwd === '123') return setError('Escolha uma senha diferente da padrão');
                onSubmit(pwd);
            };

            return (
                <div className="flex-grow flex items-center justify-center p-4 bg-gray-50">
                    <div className="bg-white rounded-[32px] shadow-2xl w-full max-w-md p-10 border border-blue-100 animate-fade-in">
                        <div className="mb-6 text-center">
                            <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                </svg>
                            </div>
                            <h2 className="text-xl font-bold text-brand-dark uppercase tracking-tight">Primeiro Acesso</h2>
                            <p className="text-xs text-gray-400 mt-2">Para sua segurança, você deve cadastrar uma nova senha antes de continuar.</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div className="space-y-4">
                                <input type="password" placeholder="Nova Senha" value={pwd} onChange={e=>setPwd(e.target.value)} className="w-full px-4 py-4 bg-gray-50 border-2 border-transparent focus:border-brand-light focus:bg-white rounded-2xl outline-none text-sm transition-all" required />
                                <input type="password" placeholder="Confirme a Nova Senha" value={confirmPwd} onChange={e=>setConfirmPwd(e.target.value)} className="w-full px-4 py-4 bg-gray-50 border-2 border-transparent focus:border-brand-light focus:bg-white rounded-2xl outline-none text-sm transition-all" required />
                            </div>
                            {error && <p className="text-red-500 text-[10px] font-black uppercase text-center">{error}</p>}
                            <button className="w-full bg-brand-dark text-white font-black py-4 rounded-2xl shadow-xl hover:bg-brand-light transition-all uppercase tracking-widest text-xs">Atualizar Senha</button>
                        </form>
                    </div>
                </div>
            );
        }

        function Navbar({ user, onLogout, activeTab, onTabChange, stats, viewMode, setViewMode }) {
            return (
                <div className="bg-brand-dark text-white shadow-2xl sticky top-0 z-50">
                    <nav className="h-16 flex items-center px-6 border-b border-white/5">
                        <div className="flex items-center space-x-8 flex-1">
                            <div className="flex flex-col"><span className="text-lg font-light tracking-widest leading-none">NAMAN</span><span className="text-[7px] font-black text-blue-400 tracking-widest">CAPITAL</span></div>
                            <div className="flex space-x-2">
                                <button onClick={() => !user.needsPasswordChange && onTabChange('CALENDAR')} className={`px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest ${activeTab === 'CALENDAR' ? 'bg-brand-light' : 'hover:bg-white/5 disabled:opacity-30'}`} disabled={user.needsPasswordChange}>Calendário</button>
                                {user.role !== 'COLABORADOR' && (
                                    <button onClick={() => !user.needsPasswordChange && onTabChange('MANAGER')} className={`px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest ${activeTab === 'MANAGER' ? 'bg-brand-light' : 'hover:bg-white/5 disabled:opacity-30'}`} disabled={user.needsPasswordChange}>Gestão</button>
                                )}
                            </div>
                        </div>

                        {stats && !user.needsPasswordChange && (
                            <div className="hidden lg:flex items-center bg-white/5 p-1 rounded-xl border border-white/10 mr-8 animate-fade-in group">
                                <div className="flex items-center px-3 py-1 space-x-1">
                                    <button 
                                        onClick={() => setViewMode('TEAM')}
                                        className={`px-2 py-1 rounded text-[8px] font-black uppercase transition-all ${viewMode === 'TEAM' ? 'bg-brand-light text-white shadow' : 'text-gray-400 hover:text-white'}`}
                                    >
                                        Time
                                    </button>
                                    <button 
                                        onClick={() => setViewMode('INDIVIDUAL')}
                                        className={`px-2 py-1 rounded text-[8px] font-black uppercase transition-all ${viewMode === 'INDIVIDUAL' ? 'bg-brand-light text-white shadow' : 'text-gray-400 hover:text-white'}`}
                                    >
                                        Indiv.
                                    </button>
                                </div>
                                <div className="h-8 w-px bg-white/10 mx-1"></div>
                                <div className="px-4 py-1.5 flex items-center">
                                    <div className="text-right mr-3">
                                        <p className="text-[7px] font-black text-blue-300 uppercase leading-none mb-1 tracking-tighter">{stats.label}</p>
                                        <p className="text-[10px] font-bold leading-none">{stats.count} {stats.count === 1 ? 'Perfil' : 'Membros'}</p>
                                    </div>
                                    <div className={`text-lg font-black ${stats.total >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                                        {stats.total > 0 ? '+' : ''}{stats.total.toFixed(1)}h
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="flex items-center space-x-4">
                            <div className="text-right hidden sm:block">
                                <p className="text-[10px] font-black uppercase">{user.name}</p>
                                <p className="text-[8px] text-blue-300 font-bold">{user.role} • {user.team}</p>
                            </div>
                            <button onClick={onLogout} className="text-red-400 hover:text-white hover:bg-red-500 p-2 rounded-lg text-[9px] font-black uppercase transition-all border border-red-500/20">Sair</button>
                        </div>
                    </nav>
                </div>
            );
        }

        function Calendar({ user, events, users, filterUser, setFilterUser, onSaveEvent }) {
            const [viewDate, setViewDate] = useState(new Date());
            const [modal, setModal] = useState(null);

            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const startDay = new Date(year, month, 1).getDay();
            const calendarDays = [...Array(startDay).fill(null), ...Array.from({ length: daysInMonth }, (_, i) => i + 1)];

            const visibleUsers = useMemo(() => {
                if (user.role === 'ADMIN') return users;
                if (user.role === 'GESTOR') return users.filter(u => u.team === user.team);
                return [user];
            }, [users, user]);

            return (
                <div className="animate-fade-in">
                    <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                        <div className="flex items-center bg-white p-1 rounded-2xl shadow-sm border">
                            <button onClick={() => setViewDate(new Date(year, month - 1, 1))} className="p-3 hover:bg-gray-100 rounded-xl transition-all">❮</button>
                            <span className="px-6 text-sm font-black uppercase tracking-widest text-brand-dark min-w-[200px] text-center">
                                {viewDate.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' })}
                            </span>
                            <button onClick={() => setViewDate(new Date(year, month + 1, 1))} className="p-3 hover:bg-gray-100 rounded-xl transition-all">❯</button>
                        </div>
                        <div className="flex flex-col items-end">
                            <p className="text-[9px] font-black text-gray-400 uppercase mb-1">Visualizar Colaborador:</p>
                            <select value={filterUser} onChange={e => setFilterUser(e.target.value)} className="bg-white border text-[10px] font-black uppercase px-4 py-3 rounded-xl outline-none focus:ring-2 ring-brand-light shadow-sm">
                                {visibleUsers.map(u => <option key={u.email} value={u.email}>{u.name} ({u.team})</option>)}
                            </select>
                        </div>
                    </div>

                    <div className="bg-white rounded-[32px] shadow-xl overflow-hidden border">
                        <div className="grid grid-cols-7 bg-gray-50 border-b">
                            {['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'].map(d => (
                                <div key={d} className="py-4 text-center text-[10px] font-black uppercase text-gray-400 tracking-widest border-r last:border-0">{d}</div>
                            ))}
                        </div>
                        <div className="grid grid-cols-7 gap-px bg-gray-100">
                            {calendarDays.map((day, i) => {
                                if (!day) return <div key={i} className="bg-gray-50/50 calendar-day-cell" />;
                                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                                const isWeekend = (i % 7 === 0 || i % 7 === 6);
                                const holiday = FIXED_DATES[dateStr];
                                const dayEvent = events.find(e => e.date === dateStr && e.email === filterUser);
                                
                                return (
                                    <div key={i} 
                                        onClick={() => {
                                            if (user.role === 'ADMIN' || user.role === 'GESTOR' || filterUser === user.email) {
                                                setModal({ date: dateStr });
                                            }
                                        }} 
                                        className={`bg-white calendar-day-cell p-2 cursor-pointer hover:bg-blue-50 transition-all relative ${holiday ? 'locked-day' : ''} ${isWeekend ? 'bg-gray-50/30' : ''}`}
                                    >
                                        <span className={`text-[11px] font-black ${holiday ? 'text-brand-light' : isWeekend ? 'text-gray-300' : 'text-gray-400'}`}>{day}</span>
                                        <div className="mt-2 space-y-1">
                                            {holiday && <div className={`text-[7px] font-black uppercase px-1.5 py-1 rounded text-white ${holiday.status === 'feriado' ? 'bg-status-feriado' : 'bg-status-ponte'}`}>{holiday.label}</div>}
                                            {dayEvent && <div className={`text-[7px] font-black uppercase px-1.5 py-1 rounded text-white shadow-sm ${STATUS_OPTIONS[dayEvent.status.toUpperCase()]?.color || 'bg-gray-400'}`}>{STATUS_OPTIONS[dayEvent.status.toUpperCase()]?.label} {dayEvent.hours ? `(${dayEvent.hours}h)` : ''}</div>}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {modal && <Modal date={modal.date} currentEmail={filterUser} onClose={() => setModal(null)} onSave={onSaveEvent} initialEvent={events.find(e => e.date === modal.date && e.email === filterUser)} holiday={FIXED_DATES[modal.date]} />}
                </div>
            );
        }

        function Modal({ date, currentEmail, onClose, onSave, initialEvent, holiday }) {
            const [status, setStatus] = useState(initialEvent?.status || '');
            const [hours, setHours] = useState(initialEvent?.hours || '');
            const dateFmt = new Date(date + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });

            return (
                <div className="fixed inset-0 bg-brand-dark/90 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                    <div className="bg-white rounded-[32px] w-full max-w-lg shadow-2xl p-8 animate-fade-in">
                        <div className="flex justify-between items-start mb-8">
                            <div><h3 className="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1">Apontamento</h3><p className="text-xl font-bold text-brand-dark">{dateFmt}</p></div>
                            <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-full">✕</button>
                        </div>
                        {holiday ? (
                            <div className="bg-blue-50 p-6 rounded-3xl text-center"><p className="font-bold text-brand-dark uppercase text-[10px] mb-2">Bloqueado para Edição</p><p className="font-bold text-brand-dark">{holiday.label}</p></div>
                        ) : (
                            <div className="space-y-6">
                                <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                    {Object.values(STATUS_OPTIONS).filter(o => o.id !== 'feriado').map(opt => (
                                        <button key={opt.id} onClick={() => setStatus(opt.id)} className={`p-3 rounded-2xl border-2 text-[9px] font-black uppercase transition-all ${status === opt.id ? 'border-brand-light bg-brand-light text-white shadow-lg' : 'border-gray-100 text-gray-400 hover:border-gray-200'}`}>{opt.label}</button>
                                    ))}
                                </div>
                                {status === 'extra' && <input type="number" step="0.5" value={hours} onChange={e => setHours(e.target.value)} className="w-full border-2 border-gray-100 rounded-2xl px-6 py-4 outline-none focus:border-brand-light font-bold text-center" placeholder="Qtd horas extras" />}
                                <div className="flex gap-3"><button onClick={() => { onSave(date, '', currentEmail); onClose(); }} className="flex-1 border-2 border-gray-100 py-4 rounded-2xl text-[10px] font-black uppercase text-gray-400">Remover</button><button onClick={() => { onSave(date, status, currentEmail, hours); onClose(); }} className="flex-[2] bg-brand-dark text-white py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-xl transition-all">Salvar Apontamento</button></div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function ManagerView({ currentUser, users, setUsers, teams, setTeams, calculateBalance }) {
            const [showUserForm, setShowUserForm] = useState(false);
            const [showTeamForm, setShowTeamForm] = useState(false);
            const [newUser, setNewUser] = useState({ name: '', email: '', role: 'COLABORADOR', team: currentUser.team });
            const [newTeamName, setNewTeamName] = useState('');
            const [msg, setMsg] = useState('');
            const [teamFilter, setTeamFilter] = useState('ALL');

            const handleAddUser = () => {
                if (!newUser.name || !newUser.email) return setMsg('Preencha os campos!');
                const emailFull = newUser.email.includes('@') ? newUser.email : newUser.email + DOMAIN;
                setUsers(prev => [...prev, { ...newUser, email: emailFull, password: '123', adjustment: 0, needsPasswordChange: true }]);
                setShowUserForm(false);
                setNewUser({ name: '', email: '', role: 'COLABORADOR', team: currentUser.team });
                setMsg('Usuário criado!');
                setTimeout(() => setMsg(''), 3000);
            };

            const handleAddTeam = () => {
                if (!newTeamName) return;
                if (teams.some(t => t.toLowerCase() === newTeamName.toLowerCase())) return setMsg('Time já existe');
                setTeams(prev => [...prev, newTeamName.trim()]);
                setNewTeamName('');
                setMsg('Time adicionado!');
                setTimeout(() => setMsg(''), 3000);
            };

            const handleRemoveTeam = (teamToRemove) => {
                if (DEFAULT_TEAMS.includes(teamToRemove)) return setMsg('Time padrão não pode ser removido');
                if (users.some(u => u.team === teamToRemove)) return setMsg('Existe colaborador neste time');
                setTeams(prev => prev.filter(t => t !== teamToRemove));
            };

            const handleRemoveUser = (email) => {
                if (!confirm('Excluir este colaborador?')) return;
                setUsers(prev => prev.filter(u => u.email !== email));
            };

            const handleUpdateUser = (email, data) => {
                setUsers(prev => prev.map(u => u.email === email ? { ...u, ...data } : u));
            };

            const filteredUsers = users.filter(u => {
                const isMyTeam = currentUser.role === 'ADMIN' || u.team === currentUser.team;
                const matchesTeamFilter = teamFilter === 'ALL' || u.team === teamFilter;
                return isMyTeam && matchesTeamFilter;
            });

            return (
                <div className="space-y-6">
                    {msg && <div className="fixed top-20 right-4 bg-brand-dark text-white px-6 py-3 rounded-xl shadow-2xl z-[200] animate-bounce text-[10px] font-black uppercase">{msg}</div>}
                    
                    <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center bg-white p-6 rounded-[32px] shadow-xl border gap-4">
                        <div className="flex-1">
                            <h2 className="text-xl font-bold text-brand-dark">Gestão</h2>
                            <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest">
                                {currentUser.role === 'ADMIN' ? 'Controle Geral' : `Gestão de ${currentUser.team}`}
                            </p>
                        </div>
                        
                        <div className="flex flex-wrap items-center gap-3">
                            {currentUser.role === 'ADMIN' && (
                                <button onClick={() => setShowTeamForm(true)} className="border-2 border-brand-dark text-brand-dark px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-gray-50 transition-all">Config. Times</button>
                            )}
                            <div className="flex items-center bg-gray-50 px-3 py-2 rounded-xl border border-gray-100">
                                <span className="text-[8px] font-black uppercase text-gray-400 mr-3">Exibir:</span>
                                <select value={teamFilter} onChange={e => setTeamFilter(e.target.value)} className="bg-transparent text-[9px] font-black uppercase outline-none">
                                    <option value="ALL">Todos</option>
                                    {teams.map(t => <option key={t} value={t}>{t}</option>)}
                                </select>
                            </div>
                            {currentUser.role === 'ADMIN' && (
                                <button onClick={() => setShowUserForm(true)} className="bg-brand-dark text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg">+ Novo Membro</button>
                            )}
                        </div>
                    </div>

                    <div className="bg-white rounded-[32px] shadow-xl border overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead className="bg-gray-50 border-b">
                                    <tr className="text-[10px] font-black uppercase text-gray-400">
                                        <th className="px-6 py-4 text-left">Membro</th>
                                        <th className="px-6 py-4 text-left">Equipe / Nível</th>
                                        <th className="px-6 py-4 text-center">Saldo Atual</th>
                                        <th className="px-6 py-4 text-right">Controles</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y">
                                    {filteredUsers.map(u => {
                                        const balance = calculateBalance(u.email);
                                        return (
                                            <tr key={u.email} className="hover:bg-gray-50 transition-colors">
                                                <td className="px-6 py-5">
                                                    <p className="font-bold text-brand-dark">{u.name}</p>
                                                    <p className="text-[9px] text-gray-400">{u.email}</p>
                                                </td>
                                                <td className="px-6 py-5">
                                                    <div className="flex flex-col gap-1">
                                                        {currentUser.role === 'ADMIN' ? (
                                                            <select value={u.team} onChange={e => handleUpdateUser(u.email, { team: e.target.value })} className="text-[8px] font-black uppercase bg-gray-100 px-2 py-1 rounded outline-none">
                                                                {teams.map(t => <option key={t} value={t}>{t}</option>)}
                                                            </select>
                                                        ) : (
                                                            <span className="text-[8px] font-black uppercase bg-gray-100 px-2 py-1 rounded text-gray-600 w-fit">{u.team}</span>
                                                        )}
                                                        <span className="text-[8px] font-black uppercase text-blue-500">{u.role}</span>
                                                    </div>
                                                </td>
                                                <td className="px-6 py-5 text-center">
                                                    <div className={`text-sm font-black ${balance >= 0 ? 'text-green-500' : 'text-red-500'}`}>{balance > 0 ? '+' : ''}{balance.toFixed(1)}h</div>
                                                    <div className="flex items-center justify-center mt-1">
                                                        <span className="text-[8px] font-black text-gray-300 mr-2 uppercase">Ajuste (h):</span>
                                                        <input type="number" value={u.adjustment} onChange={e => handleUpdateUser(u.email, { adjustment: e.target.value })} className="w-12 border rounded px-1 py-0.5 text-[10px] font-bold text-center" />
                                                    </div>
                                                </td>
                                                <td className="px-6 py-5 text-right space-x-3">
                                                    <button onClick={() => handleUpdateUser(u.email, { password: '123', needsPasswordChange: true })} className="text-[8px] font-black uppercase text-gray-400 hover:text-brand-dark">Reset</button>
                                                    {currentUser.role === 'ADMIN' && u.email !== currentUser.email && (
                                                        <button onClick={() => handleRemoveUser(u.email)} className="text-[8px] font-black uppercase text-red-300 hover:text-red-500">Excluir</button>
                                                    )}
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Modal Cadastro Usuário */}
                    {showUserForm && (
                        <div className="fixed inset-0 bg-brand-dark/90 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-[32px] w-full max-w-md shadow-2xl p-8 animate-fade-in">
                                <h3 className="text-xl font-bold text-brand-dark mb-6 uppercase tracking-tight">Cadastrar Membro</h3>
                                <div className="space-y-4">
                                    <input type="text" placeholder="Nome Completo" value={newUser.name} onChange={e=>setNewUser({...newUser, name: e.target.value})} className="w-full border-2 border-gray-100 rounded-xl px-4 py-3 outline-none focus:border-brand-light" />
                                    <input type="text" placeholder="E-mail (prefixo)" value={newUser.email} onChange={e=>setNewUser({...newUser, email: e.target.value})} className="w-full border-2 border-gray-100 rounded-xl px-4 py-3 outline-none focus:border-brand-light" />
                                    <select value={newUser.team} onChange={e=>setNewUser({...newUser, team: e.target.value})} className="w-full border-2 border-gray-100 rounded-xl px-4 py-3 outline-none focus:border-brand-light">
                                        {teams.map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>
                                    <select value={newUser.role} onChange={e=>setNewUser({...newUser, role: e.target.value})} className="w-full border-2 border-gray-100 rounded-xl px-4 py-3 outline-none focus:border-brand-light">
                                        <option value="COLABORADOR">Colaborador</option>
                                        <option value="GESTOR">Gestor</option>
                                        <option value="ADMIN">Administrador</option>
                                    </select>
                                    <div className="flex gap-3 pt-4">
                                        <button onClick={()=>setShowUserForm(false)} className="flex-1 border-2 border-gray-100 py-3 rounded-xl text-[10px] font-black uppercase text-gray-400">Cancelar</button>
                                        <button onClick={handleAddUser} className="flex-[2] bg-brand-dark text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest">Salvar</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Gerenciar Times */}
                    {showTeamForm && (
                        <div className="fixed inset-0 bg-brand-dark/90 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-[32px] w-full max-w-md shadow-2xl p-8 animate-fade-in">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-bold text-brand-dark uppercase tracking-tight">Gerenciar Times</h3>
                                    <button onClick={() => setShowTeamForm(false)} className="text-gray-400">✕</button>
                                </div>
                                <div className="flex gap-2 mb-6">
                                    <input type="text" placeholder="Novo time..." value={newTeamName} onChange={e=>setNewTeamName(e.target.value)} className="flex-1 border-2 border-gray-100 rounded-xl px-4 py-2 outline-none focus:border-brand-light text-sm" />
                                    <button onClick={handleAddTeam} className="bg-brand-light text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Add</button>
                                </div>
                                <div className="space-y-2 max-h-60 overflow-y-auto pr-2">
                                    {teams.map(t => (
                                        <div key={t} className="flex justify-between items-center bg-gray-50 px-4 py-3 rounded-xl border">
                                            <span className="text-xs font-bold text-brand-dark uppercase">{t}</span>
                                            {!DEFAULT_TEAMS.includes(t) && (
                                                <button onClick={() => handleRemoveTeam(t)} className="text-red-400 text-[10px] font-black hover:text-red-600">Remover</button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                                <button onClick={()=>setShowTeamForm(false)} className="w-full mt-6 bg-brand-dark text-white py-3 rounded-xl text-[10px] font-black uppercase">Fechar</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
